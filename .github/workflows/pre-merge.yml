# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# ESLint is a tool for identifying and reporting on patterns
# found in ECMAScript/JavaScript code.
# More details at https://github.com/eslint/eslint
# and https://eslint.org

name: Lint, generate PDF, and upload to GitHub when merging to main

on:
    pull_request:
        types:
            - labeled
            - unlabeled
            - synchronize
            - opened
            - edited
            - ready_for_review
            - reopened
            - unlocked
        branches: ['main']

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - uses: actions/setup-node@v3
              with:
                  node-version: 16.x

            - name: Run install
              run: |
                  yarn add -D @microsoft/eslint-formatter-sarif@2.1.7
                  yarn install --frozen-lockfile
                  yarn lint . --ext .js,.jsx,.ts,.tsx --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
            - name: Upload analysis results to GitHub
              uses: github/codeql-action/upload-sarif@v2
              with:
                  sarif_file: eslint-results.sarif
                  wait-for-processing: true
    pdf:
        name: Generate PDF
        runs-on: ubuntu-latest
        permissions:
            contents: read
            security-events: write
            actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Run project locally in another process
              env:
                  GITHUB_API_TOKEN: ${{ secrets.API_TOKEN }}
              run: |
                  yarn install --frozen-lockfile
                  echo "GITHUB_API_TOKEN=$GITHUB_API_TOKEN" > .env
                  yarn build
                  yarn start &
                  sleep 10
            - name: Convert http://localhost:3000/resume to PDF
              uses: 'ruvasqm/puppeteer-pdf-action@master'
              with:
                  url: http://localhost:3000/resume
                  output-file-path: cv_ruben_vasquez.pdf
            - name: Upload PDF to GitHub
              uses: actions/upload-artifact@v2
              with:
                  name: resume
                  path: cv_ruben_vasquez.pdf
    commit-pdf:
        name: Commit PDF
        runs-on: ubuntu-latest
        needs: [lint, pdf]
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
              with:
                  ref: dev
            - name: Download PDF
              uses: actions/download-artifact@v2
              with:
                  name: resume
                  path: cv_ruben_vasquez.pdf
            - name: Commit PDF
              run: |
                  rm public/cv_ruben_vasquez.pdf
                  mv cv_ruben_vasquez.pdf public/cv_ruben_vasquez.pdf
                  git config --local user.email "ruvasqm@gmail.com"
                  git config --local user.name "Ruben Vasquez"
                  git add public/cv_ruben_vasquez.pdf
                  git commit -m "Update PDF"
                  git push
