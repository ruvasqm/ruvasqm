name: Convert resume to PDF
on:
  push:
    branches:
      - master
jobs:
  make-cv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Print pdf
        uses: "ruvasqm/puppeteer-pdf-action@master"
        with:
          url: https://ruvasqm.tech/resume
          output-file-path: "./public/cv_ruben_vasquez.pdf"
      - name: Commit and push changes
        uses: devops-infra/action-commit-push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "chore(pdf): automatic pdf generation"
